# 房间市场登记预检。房间源、manifest、入口与 ZIP 的解析由 @parti/room-source 统一实现；
# workflow 只负责执行解析器并更新 issue 注册表。
name: room-issue-triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: startsWith(github.event.issue.title, '[parti-room]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Resolve and validate room sources
        id: resolve
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: pnpm exec tsx scripts/room-issue-triage.ts > /tmp/triage.json

      - name: Update issue registry entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          message="$(jq -r .message /tmp/triage.json)"
          if [[ "$(jq -r .ok /tmp/triage.json)" != "true" ]]; then
            if [[ "$(jq -r '.transient // false' /tmp/triage.json)" != "true" ]]; then
              gh issue edit "$ISSUE_NUMBER" --remove-label parti-room >/dev/null 2>&1 || true
            fi
            gh issue comment "$ISSUE_NUMBER" --body "❌ $message"
            exit 0
          fi

          gh issue view "$ISSUE_NUMBER" --json body --jq .body > /tmp/body.md
          jq .manifest /tmp/triage.json > /tmp/manifest.json
          jq -c .source /tmp/triage.json > /tmp/source.json
          jq -r .sourceUrl /tmp/triage.json > /tmp/source-url.txt
          python3 - <<'PY'
          import json, pathlib, re
          START = '<!-- parti-room:manifest:start -->'
          END = '<!-- parti-room:manifest:end -->'
          body_path = pathlib.Path('/tmp/body.md')
          body = body_path.read_text()
          manifest = pathlib.Path('/tmp/manifest.json').read_text().strip()
          source = json.loads(pathlib.Path('/tmp/source.json').read_text())
          source_url = pathlib.Path('/tmp/source-url.txt').read_text().strip()
          source_marker = '<!-- parti-room:source:' + json.dumps(source, separators=(',', ':')) + ' -->'
          link_start = '<!-- parti-room:source-link:start -->'
          link_end = '<!-- parti-room:source-link:end -->'
          source_link = f"{link_start}\n**已解析的房间包源码：** [查看对应仓库分支与目录]({source_url})\n{link_end}"
          legacy = ''
          primary = source['primary']
          if primary['kind'] == 'git-folder':
              legacy = f"\n<!-- parti-room:package-dir:{primary['packageDir']} -->"
          block = f"{source_link}\n\n{START}\n```json\n{manifest}\n```\n{END}\n{source_marker}{legacy}"
          pattern = re.compile(
              r'(?:' + re.escape(link_start) + r'[\s\S]*?' + re.escape(link_end) + r'\s*)?'
              + re.escape(START) + r'[\s\S]*?' + re.escape(END)
              + r'(?:\s*<!--\s*parti-room:source:\{[^\r\n]*\}\s*-->)?'
              + r'(?:\s*<!--\s*parti-room:package-dir:[^\s>]+\s*-->)?')
          if pattern.search(body):
              body = pattern.sub(lambda _: block, body, count=1)
          else:
              body = body.rstrip() + '\n\n---\n' + block + '\n'
          body_path.write_text(body)
          PY
          gh issue edit "$ISSUE_NUMBER" --body-file /tmp/body.md

          gh label create parti-room --color 0E8A16 --description "房间市场：已上架" --force >/dev/null
          gh label create beta --color FBCA04 --description "房间市场：测试版，未经充分测试" --force >/dev/null
          gh label create recommend --color 1D76DB --description "房间市场：维护者推荐" --force >/dev/null
          if gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | grep -qx parti-room; then
            gh issue edit "$ISSUE_NUMBER" --remove-label beta >/dev/null 2>&1 || true
          fi
          gh issue edit "$ISSUE_NUMBER" --add-label parti-room,beta
          gh issue comment "$ISSUE_NUMBER" --body "✅ $message 默认标记为 \`beta\`，维护者试玩后可改为 \`recommend\`。"
